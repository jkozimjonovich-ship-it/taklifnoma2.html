<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jamshid & Shahzoda</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9920A;
            --gold-bright: #F0C040;
            --navy: #080C1A;
            --gold-pale: #E8D5A3;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--navy);
            color: var(--gold-pale);
            font-family: 'Raleway', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Fon animatsiyasi */
        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* Kirish ekrani */
        #overlay {
            position: fixed; inset: 0; z-index: 200; background: var(--navy);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.8s ease;
        }
        #overlay h2 { font-family: 'Playfair Display', serif; color: var(--gold-bright); margin-bottom: 20px; }
        #overlay p { color: var(--gold-pale); font-size: 0.7rem; letter-spacing: 2px; }

        /* Tilni almashtirish */
        .lang-switch { position: fixed; top: 20px; left: 20px; z-index: 150; display: flex; gap: 5px; }
        .lang-btn { 
            background: rgba(201,146,10,0.1); border: 1px solid var(--gold); 
            color: var(--gold); padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 0.8rem;
        }
        .lang-btn.active { background: var(--gold); color: white; }

        /* Musiqa tugmasi */
        #musicBtn {
            position: fixed; top: 20px; right: 20px; z-index: 150;
            width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--gold);
            background: rgba(8,12,26,0.8); color: var(--gold-bright); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        /* Asosiy qismlar */
        .content-wrap { position: relative; z-index: 1; padding: 60px 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .invitation-text { letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; color: var(--gold); }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 10vw, 5.5rem); color: var(--gold-bright); margin: 25px 0; }
        .date-text { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 3px; }

        .details-card {
            background: rgba(13,21,48,0.85);
            border: 1px solid rgba(201,146,10,0.3);
            padding: 40px 20px; margin: 50px auto; max-width: 500px;
            backdrop-filter: blur(10px);
        }

        /* Tugmalar (Siz xohlagan tillarang ko'rinishda) */
        .btn-link {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            border: 1px solid var(--gold-bright);
            color: var(--gold-bright) !important;
            text-decoration: none !important;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn-link:hover { background: var(--gold); color: #fff !important; }

        .info-row { display: flex; justify-content: space-around; margin: 30px 0; border-top: 1px solid rgba(201,146,10,0.2); padding-top: 20px; }
        .info-item h4 { color: var(--gold); text-transform: uppercase; font-size: 0.7rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>Jamshid & Shahzoda</h2>
    <p>OCHISH / OTKRIT</p>
</div>

<div class="lang-switch">
    <button class="lang-btn active" onclick="changeLang('uz')">UZB</button>
    <button class="lang-btn" onclick="changeLang('ru')">RUS</button>
</div>

<button id="musicBtn">🕯</button>
<canvas id="bgCanvas"></canvas>

<div class="content-wrap">
    <p class="invitation-text" id="txt-invite">Taklifnoma</p>
    <h1>Jamshid & Shahzoda</h1>
    <p class="date-text">25 . 04 . 2026</p>

    <div class="details-card">
        <div class="info-row">
            <div class="info-item">
                <h4 id="txt-addr-label">Manzil</h4>
                <p>Yakkasaroy Palace</p>
                <p style="font-size: 0.8rem; opacity: 0.8;">A. Kaxxor ko'chasi, 40</p>
            </div>
            <div class="info-item">
                <h4 id="txt-time-label">Vaqt</h4>
                <p id="txt-time-val">Soat 18:30</p>
            </div>
        </div>
        
        <a href="https://maps.google.com/?q=Yakkasaroy+Palace+Tashkent" class="btn-link" id="txt-map">Xaritada ko'rish</a>
        <br>
        <a href="https://t.me/KKadirov" class="btn-link" id="txt-confirm">Tashrifni tasdiqlash</a>
    </div>
</div>

<script>
    const data = {
        uz: {
            invite: "Taklifnoma",
            addr: "Manzil",
            time: "Vaqt",
            timeVal: "Soat 18:30",
            map: "Xaritada ko'rish",
            confirm: "Tashrifni tasdiqlash"
        },
        ru: {
            invite: "Приглашение",
            addr: "Адрес",
            time: "Время",
            timeVal: "В 18:30",
            map: "Открыть на карте",
            confirm: "Подтвердить присутствие"
        }
    };

    function changeLang(lang) {
        document.getElementById('txt-invite').innerText = data[lang].invite;
        document.getElementById('txt-addr-label').innerText = data[lang].addr;
        document.getElementById('txt-time-label').innerText = data[lang].time;
        document.getElementById('txt-time-val').innerText = data[lang].timeVal;
        document.getElementById('txt-map').innerText = data[lang].map;
        document.getElementById('txt-confirm').innerText = data[lang].confirm;

        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    // Musiqa (Yoqimli pianino)
    let audioCtx = null, playing = false;
    function initMusic() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playing = true;
        const gain = audioCtx.createGain(); gain.connect(audioCtx.destination); gain.gain.value = 0.08;
        const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; 
        setInterval(() => {
            if(!playing) return;
            let now = audioCtx.currentTime;
            notes.forEach((f, i) => {
                let osc = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + i*0.6);
                g.gain.setValueAtTime(0, now + i*0.6);
                g.gain.linearRampToValueAtTime(0.1, now + i*0.6 + 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, now + i*0.6 + 1.2);
                osc.connect(g); g.connect(gain);
                osc.start(now + i*0.6); osc.stop(now + i*0.6 + 1.5);
            });
        }, 4500);
    }

    document.getElementById('overlay').addEventListener('click', function() {
        this.style.opacity = '0';
        setTimeout(() => this.remove(), 800);
        initMusic();
        document.getElementById('musicBtn').innerText = '🔇';
    });

    document.getElementById('musicBtn').addEventListener('click', function() {
        playing = !playing;
        this.innerText = playing ? '🔇' : '🕯';
    });

    // Sparkles fon
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let sparks = Array.from({length: 50}, () => ({ x: Math.random(), y: Math.random(), s: Math.random()*2, v: 0.0005 + Math.random()*0.001 }));
    function animate() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = '#080C1A'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#F0C040';
        sparks.forEach(s => {
            s.y -= s.v; if(s.y < 0) s.y = 1;
            ctx.beginPath(); ctx.arc(s.x*canvas.width, s.y*canvas.height, s.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
